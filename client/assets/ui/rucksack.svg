<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="geometricPrecision">
  <!-- Legends of Sherwood — inventory rucksack/satchel tab icon -->
  <defs>
    <linearGradient id="leather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a5a2b"/>
      <stop offset="1" stop-color="#5a3818"/>
    </linearGradient>
    <linearGradient id="flap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a06d38"/>
      <stop offset="1" stop-color="#734725"/>
    </linearGradient>
  </defs>
  <!-- shoulder straps -->
  <path d="M15 12 Q13 26 15 40" fill="none" stroke="#3f2712" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M33 12 Q35 26 33 40" fill="none" stroke="#3f2712" stroke-width="3.2" stroke-linecap="round"/>
  <!-- bag body -->
  <rect x="8" y="17" width="32" height="25" rx="7" fill="url(#leather)" stroke="#33200f" stroke-width="2"/>
  <!-- side pockets -->
  <rect x="6.5" y="24" width="7" height="14" rx="3" fill="#6e451f" stroke="#33200f" stroke-width="1.6"/>
  <rect x="34.5" y="24" width="7" height="14" rx="3" fill="#6e451f" stroke="#33200f" stroke-width="1.6"/>
  <!-- top flap -->
  <path d="M9 20 Q9 9 24 9 Q39 9 39 20 L39 27 Q24 33 9 27 Z" fill="url(#flap)" stroke="#33200f" stroke-width="2"/>
  <!-- flap stitch line -->
  <path d="M12 22 Q24 28 36 22" fill="none" stroke="#c79a5c" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>
  <!-- buckle straps over the flap -->
  <rect x="16" y="20" width="4.5" height="14" rx="1.4" fill="#4a2e14" stroke="#2a1a0b" stroke-width="1"/>
  <rect x="27.5" y="20" width="4.5" height="14" rx="1.4" fill="#4a2e14" stroke="#2a1a0b" stroke-width="1"/>
  <!-- brass buckles -->
  <rect x="15.5" y="26" width="5.5" height="4" rx="1" fill="#e8c24e" stroke="#7a5a15" stroke-width="1"/>
  <rect x="27" y="26" width="5.5" height="4" rx="1" fill="#e8c24e" stroke="#7a5a15" stroke-width="1"/>
</svg>
